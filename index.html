<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hook Spot</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div id="header">
          <h1>Hook Spot</h1>
          <label id="upload-label" for="file-input">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Add Photos
          </label>
          <input id="file-input" type="file" accept="image/*" multiple />
        </div>
        <div id="photo-list"></div>
        <div id="no-photos">
          <p>Drop photos here or click <strong>Add Photos</strong> to get started.</p>
          <p class="hint">Photos need GPS data embedded to appear on the map.</p>
        </div>
      </div>
      <div id="map"></div>
      <div id="drop-overlay">
        <div id="drop-message">Drop photos to add them</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
