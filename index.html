<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hook Spot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Floating pill nav -->
      <div id="nav-bar">
        <div id="nav-pill">
          <div id="nav-dropdown-wrap">
            <button id="nav-dropdown-btn">Hook Spot <svg id="nav-chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
            <div id="nav-dropdown-menu">
              <button class="nav-option active" data-view="map">Map</button>
              <button class="nav-option" data-view="stats">Stats</button>
            </div>
          </div>
        </div>
        <button id="fab-add">+</button>
      </div>
      <input id="file-input" type="file" accept="image/*" multiple />

      <!-- Main content -->
      <div id="main">
        <div id="sidebar">
          <div id="photo-list"></div>
          <div id="no-photos">
            <p>Drop photos here or click <strong>+</strong> to get started.</p>
            <p class="hint">Photos need GPS data embedded to appear on the map.</p>
          </div>
        </div>
        <div id="map"></div>
      </div>

      <!-- Stats view -->
      <div id="stats-view">
        <div class="stats-scroll">
          <div class="stats-header">
            <span class="stats-title">Stats</span>
            <span id="stats-total" class="stats-total"></span>
          </div>
          <div class="stats-grid">
            <div class="stats-card">
              <div class="stats-card-label">Catches per Month</div>
              <div id="chart-monthly"></div>
            </div>
            <div class="stats-card">
              <div class="stats-card-label">Time of Day</div>
              <div id="chart-hourly"></div>
            </div>
            <div class="stats-row-2">
              <div class="stats-card">
                <div class="stats-card-label">Species</div>
                <div id="chart-species"></div>
              </div>
              <div class="stats-card">
                <div class="stats-card-label">Species by Month</div>
                <div id="chart-species-monthly"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="drop-overlay">
        <div id="drop-message">Drop photos to add them</div>
      </div>

      <!-- Upload dialog -->
      <div id="upload-dialog" class="hidden">
        <div id="upload-backdrop"></div>
        <div id="upload-content">
          <div class="upload-header">
            <span class="upload-title">Add a catch</span>
            <button id="upload-close-btn" aria-label="Close">&#10005;</button>
          </div>

          <!-- Step 1: Pick photo -->
          <div id="upload-step-1">
            <div id="upload-drop-zone">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <div id="upload-drop-label">Drop your photo here</div>
              <div id="upload-drop-or">or</div>
              <button id="upload-browse-btn">Browse</button>
            </div>
          </div>

          <!-- Step 2: Edit details -->
          <div id="upload-step-2" class="hidden">
            <div class="popup-img-wrapper">
              <img id="upload-preview-img" alt="preview" />
              <div id="upload-file-count"></div>
            </div>
            <div class="popup-body">
              <div class="popup-edit-form">
                <label>Species</label>
                <input id="upload-species" type="text" placeholder="e.g. Brown Trout" />
                <div id="upload-identifying" class="hidden">Identifying species…</div>
                <label>Rod</label>
                <input id="upload-rod" type="text" placeholder="e.g. 9ft 5wt" />
                <label>Fly</label>
                <input id="upload-fly" type="text" placeholder="e.g. Elk Hair Caddis #14" />
                <div class="edit-actions">
                  <button id="upload-submit-btn" class="edit-save">Add Catch</button>
                  <button id="upload-cancel-btn" class="edit-cancel">Cancel</button>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
      <div id="upload-toast" class="hidden"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
