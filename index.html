<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hook Spot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="header">
        <h1>Hook Spot</h1>
        <label id="upload-label" for="file-input">
          Submit a Catch
        </label>
        <input id="file-input" type="file" accept="image/*" multiple />
      </div>
      <div id="main">
        <div id="sidebar">
          <div id="photo-list"></div>
          <div id="no-photos">
            <p>Drop photos here or click <strong>Add Photos</strong> to get started.</p>
            <p class="hint">Photos need GPS data embedded to appear on the map.</p>
          </div>
        </div>
        <div id="map"></div>
      </div>
      <div id="drop-overlay">
        <div id="drop-message">Drop photos to add them</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
